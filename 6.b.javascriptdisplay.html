<!DOCTYPE html>
<html>
<head>
  <title>JavaScript Output Methods</title>
</head>
<body>
  <h1>JavaScript Output Demo</h1>
  <p id="demo"></p>

  <script>
    // 1. Alert box
    alert("Hello from alert!");

    // 2. Document write
    document.write("This is written directly into the page.<br>");

    // 3. InnerHTML
    document.getElementById("demo").innerHTML = "This text is set using innerHTML.";

    // 4. Console log
    console.log("This message appears in the console.");
  </script>
</body>
</html>
