<!DOCTYPE html>
<html>
<head>
<title>Array Object Example</title>
</head>
<body>

<h2>Array Object Properties and Methods</h2>

<script>
var fruits = ["Apple", "Banana", "Mango"];
document.write("Array Length: " + fruits.length + "<br>");
fruits.push("Orange");
fruits.pop();
document.write("Array Elements: " + fruits.join(", ") + "<br>");
document.write("First Element: " + fruits[0] + "<br>");
document.write("Second Element: " + fruits[1] + "<br>");
document.write("Third Element: " + fruits[2]);
</script>

</body>
</html>
