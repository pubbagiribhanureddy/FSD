<!DOCTYPE html>
<html>
<head>
    <title>Armstrong Number</title>
</head>
<body>

<h2>Check Armstrong Number</h2>

<label>Enter a number:</label>
<input type="number" id="num"><br><br>

<button onclick="checkArmstrong()">Check</button>

<h3 id="result"></h3>

<script>
function checkArmstrong() {
    let num = parseInt(document.getElementById("num").value);
    let original = num;
    let sum = 0;

    while (num > 0) {
        let digit = num % 10;
        sum += digit * digit * digit; // cube of digit
        num = Math.floor(num / 10);
    }

    if (sum === original) {
        document.getElementById("result").innerHTML =
            original + " is an ARMSTRONG NUMBER";
    } else {
        document.getElementById("result").innerHTML =
            original + " is NOT an ARMSTRONG NUMBER";
    }
}
</script>

</body>
</html>
