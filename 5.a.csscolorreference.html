<!DOCTYPE html>
<html>
<head>
<style>
.named { color: red; }
.hex { color: #00FF00; }
.rgb { color: rgb(0, 0, 255); }
.rgba { color: rgba(255, 165, 0, 0.7); }   
.hsl { color: hsl(300, 100%, 25%); }
.hsla { color: hsla(200, 100%, 50%, 0.5); }
</style>
</head>
<body>
  <p class="named">This is named color (red).</p>
  <p class="hex">This is hex color (#00FF00).</p>
  <p class="rgb">This is RGB color (blue).</p>
  <p class="rgba">This is RGBA color (orange, semi-transparent).</p>
  <p class="hsl">This is HSL color (purple).</p>
  <p class="hsla">This is HSLA color (cyan, semi-transparent).</p>
</body>
</html>
