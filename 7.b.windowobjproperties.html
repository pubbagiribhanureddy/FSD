<!DOCTYPE html>
<html>
<head>
    <title>Window Object Example</title>
</head>
<body>

<h2>Window Object Demo</h2>
<button onclick="showInfo()">Click Here</button>

<script>
function showInfo() {
    window.alert("This is an alert message!");
    document.write("Window Width: " + window.innerWidth + "<br>");
    document.write("Window Height: " + window.innerHeight);
}
</script>

</body>
</html>
