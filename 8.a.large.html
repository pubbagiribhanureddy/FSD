<!DOCTYPE html>
<html>
<head>
    <title>Largest Number Program</title>
</head>
<body>

<h2>Enter Three Integers</h2>

<label>First Number:</label>
<input type="number" id="num1"><br><br>

<label>Second Number:</label>
<input type="number" id="num2"><br><br>

<label>Third Number:</label>
<input type="number" id="num3"><br><br>

<button onclick="checkNumbers()">Submit</button>

<script>
function checkNumbers() {
    let a = parseInt(document.getElementById("num1").value);
    let b = parseInt(document.getElementById("num2").value);
    let c = parseInt(document.getElementById("num3").value);

    if (a === b && b === c) {
        alert("<html><body><h3>EQUAL NUMBERS</h3></body></html>");
    } else {
        let largest = a;

        if (b > largest) {
            largest = b;
        }
        if (c > largest) {
            largest = c;
        }

        alert("<html><body><h3>" + largest + " LARGER NUMBER</h3></body></html>");
    }
}
</script>

</body>
</html>
