<!DOCTYPE html>
<html>
<head>
    <title>Denomination Calculator</title>
</head>
<body>

<h2>Denomination of Amount</h2>

<label>Enter Amount:</label>
<input type="number" id="amount"><br><br>

<button onclick="calculate()">Calculate</button>

<pre id="result"></pre>

<script>
function calculate() {
    let amt = parseInt(document.getElementById("amount").value);
    let result = "";

    let notes = [100, 50, 20, 10, 5, 2, 1];

    for (let i = 0; i < notes.length; i++) {
        let count = Math.floor(amt / notes[i]);

        if (count > 0) {
            result += count + " - " + notes[i] + "'s\n";
            amt = amt % notes[i];
        }
    }

    document.getElementById("result").textContent = result;
}
</script>

</body>
</html>
