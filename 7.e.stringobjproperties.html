<!DOCTYPE html>
<html>
<head>
<title>String Object Example</title>
</head>
<body>

<h2>String Object Properties and Methods</h2>

<script>
var text = "Hello World";
document.write("Length of the string: " + text.length + "<br>");
document.write("Uppercase: " + text.toUpperCase() + "<br>");
document.write("Lowercase: " + text.toLowerCase() + "<br>");
document.write("Character at position 4: " + text.charAt(4) + "<br>");
document.write("Index of 'World': " + text.indexOf("World"));

</script>

</body>
</html>
