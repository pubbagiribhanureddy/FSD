<!DOCTYPE html>
<html>
<head>
<title>Math Object Example</title>
</head>
<body>

<h2>Math Object Properties and Methods</h2>

<script>
document.write("Value of PI: " + Math.PI + "<br>");
document.write("Square root of 25: " + Math.sqrt(25) + "<br>");
document.write("2 raised to power 3: " + Math.pow(2,3) + "<br>");
document.write("Maximum value: " + Math.max(10, 20, 30) + "<br>");
document.write("Minimum value: " + Math.min(10, 20, 30) + "<br>");
document.write("Random number: " + Math.random());

</script>

</body>
</html>
